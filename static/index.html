<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        img { width: 100%; height: 200px; object-fit: cover; border-radius: 10px; }
        .map-link { display: block; margin-top: 10px; color: #007bff; text-decoration: none; font-weight: bold; }
        .card {
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    transition: 0.3s;
    border: 1px solid #ddd;
}
.card:hover { box-shadow: 0 8px 16px rgba(0,0,0,0.2); }
button {
    padding: 10px 20px;
    background: #28a745;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}
    </style>
</head>
<body>
    <h1>🌳 GreenPay Dashboard</h1>
<h2>👥 Foydalanuvchilar va Balans</h2>
<table border="1" id="users-table">
    <thead>
        <tr><th>Ism</th><th>Telefon</th><th>Karta</th><th>Balans (so'm)</th></tr>
    </thead>
    <tbody id="users-body"></tbody>
</table>

<hr>

<h2>🌳 Daraxtlar</h2>
<div class="grid" id="trees"></div>

<script>
    // Foydalanuvchilarni yuklash
    async function loadUsers() {
        const res = await fetch('/users/');
        const data = await res.json();
        const tbody = document.getElementById('users-body');
        data.forEach(u => {
            tbody.innerHTML += `
                <tr>
                    <td>${u.full_name}</td>
                    <td>${u.phone}</td>
                    <td>${u.card || 'Yo\'q'}</td>
                    <td><strong>${u.balance}</strong></td>
                </tr>`;
        });
    }

    // Daraxtlarni yuklash
    async function loadTrees() {
        const res = await fetch('/trees/');
        const data = await res.json();
        const container = document.getElementById('trees');
        data.forEach(t => {
            container.innerHTML += `
                <div class="card">
                    <h3>${t.tree_type}</h3>
                    <p>👤 ${t.user_name} | 💰 ${t.price} so'm</p>
                    <p>Status: <span style="color:${t.status=='approved'?'green':'orange'}">${t.status}</span></p>
                </div>`;
        });
    }

    loadUsers();
    loadTrees();
</script>
</body>
</html>

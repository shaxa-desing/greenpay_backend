<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        img { width: 100%; height: 200px; object-fit: cover; border-radius: 10px; }
        .map-link { display: block; margin-top: 10px; color: #007bff; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <h1>🌳 GreenPay Dashboard</h1>
    <div class="grid" id="trees"></div>
    <script>
        async function loadTrees() {
            const res = await fetch('/trees/');
            const data = await res.json();
            const container = document.getElementById('trees');
            data.forEach(t => {
                container.innerHTML += `
                    <div class="card">
                        <h3>${t.tree_type}</h3>
                        <p>👤 ${t.user_name} | 📱 ${t.phone}</p>
                        <img src="/photo/${t.photo}" alt="tree">
                        <a class="map-link" href="https://maps.google.com/?q=${t.latitude},${t.longitude}" target="_blank">📍 Xaritada ko'rish</a>
                    </div>`;
            });
        }
        loadTrees();
    </script>
</body>
</html>
